<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おみくじ</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#fff8e8;
    padding:50px;
}

h1{
    color:#d32f2f;
}

button{
    font-size:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#d32f2f;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:48px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🎋 おみくじ 🎋</h1>

<button onclick="drawFortune()">
おみくじを引く
</button>

<div id="result"></div>

<script>
function drawFortune(){

const fortunes = [
"大吉",
"中吉",
"吉",
"小吉",
"末吉",
"凶"
];

const random =
Math.floor(Math.random()*fortunes.length);

document.getElementById("result").innerHTML =
fortunes[random];
}
</script>

</body>
</html>
